name: Linux (source build)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  install:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    permissions:
      contents: read

    env:
      TORCH_VERSION: v2.9.1
      MARCH: x86-64-v2
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_MAXSIZE: 2G

    steps:
    - name: actions/checkout@v7
      uses: actions/checkout@v7

    - name: actions/setup-python@v6 3.14
      uses: actions/setup-python@v6
      with:
        python-version: '3.14'

    - name: Free up disk space
      run: |
        sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
                    /opt/hostedtoolcache/CodeQL /usr/local/share/boost || true
        df -h /

    - name: apt-get
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          bash \
          build-essential \
          ccache \
          clang \
          cmake \
          gir1.2-gtk-3.0 \
          git \
          libcairo2-dev \
          libgirepository1.0-dev \
          libgtk-3-dev \
          libopenblas-dev \
          ninja-build \
          pkg-config

    - name: Restore ccache
      uses: actions/cache@v4
      with:
        path: .ccache
        key: ccache-glibc-${{ env.TORCH_VERSION }}-${{ hashFiles('build-torch.sh') }}-${{ github.run_id }}
        restore-keys: |
          ccache-glibc-${{ env.TORCH_VERSION }}-${{ hashFiles('build-torch.sh') }}-
          ccache-glibc-${{ env.TORCH_VERSION }}-
          ccache-glibc-

    - name: make install (source build)
      run: make install

    - name: Verify important imports
      run: |
        source "$HOME/.local/share/animus/venv/bin/activate"
        python3 -c "import gi; gi.require_version('Gtk', '3.0'); from gi.repository import Gtk, GdkPixbuf, GLib; print('Relevant GTK imports successful!')"
        python3 -c "from transformers import CLIPTokenizer; print('Relevant transformers import successful!')"
        python3 -c "from diffusers import ModularPipeline, CosmosTransformer3DModel, GGUFQuantizationConfig; print('Relevant diffusers import successful!')"
        python3 -c "import torch; print(f'torch import successful, version: {torch.__version__}')"


    - name: ccache stats
      if: always()
      run: ccache -s || true
